name: Deploy VM via SSH

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-vm
  cancel-in-progress: true

jobs:
  deploy:
    # Job quietly skips until secrets are configured.
    if: ${{ secrets.VM_HOST != '' && secrets.VM_USER != '' && secrets.VM_SSH_KEY != '' && secrets.VM_PATH != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on VM
        uses: appleboy/ssh-action@v1.2.0
        env:
          NODE_VERSION: "22"
          VM_PATH: ${{ secrets.VM_PATH }}
          VM_PUBLIC_PATH: ${{ secrets.VM_PUBLIC_PATH }}
          VM_POST_DEPLOY: ${{ secrets.VM_POST_DEPLOY }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_PORT || '22' }}
          script_stop: true
          envs: NODE_VERSION,VM_PATH,VM_PUBLIC_PATH,VM_POST_DEPLOY,GITHUB_REF_NAME
          script: |
            set -euo pipefail

            if [ -s "$HOME/.nvm/nvm.sh" ]; then
              . "$HOME/.nvm/nvm.sh"
            fi
            if command -v nvm >/dev/null 2>&1; then
              nvm install "$NODE_VERSION" >/dev/null
              nvm use "$NODE_VERSION" >/dev/null
            fi

            cd "$VM_PATH"
            git fetch --all --prune
            git checkout "$GITHUB_REF_NAME"
            git pull --ff-only origin "$GITHUB_REF_NAME"

            npm ci
            npm run build

            if [ -n "${VM_PUBLIC_PATH:-}" ]; then
              rsync -a --delete dist/ "$VM_PUBLIC_PATH"/
            fi

            if [ -n "${VM_POST_DEPLOY:-}" ]; then
              bash -lc "$VM_POST_DEPLOY"
            fi
