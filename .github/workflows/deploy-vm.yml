name: Deploy VM via SSH

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-vm
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Preflight secrets
        id: preflight
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
          VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
          VM_PATH: ${{ secrets.VM_PATH }}
        run: |
          set -euo pipefail
          missing=0
          for key in VM_HOST VM_USER VM_SSH_KEY VM_PATH; do
            if [ -z "${!key:-}" ]; then
              echo "::warning::Missing required secret: $key"
              missing=1
            fi
          done

          if [ "$missing" -eq 1 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Deploy on VM
        if: ${{ steps.preflight.outputs.ready == 'true' }}
        uses: appleboy/ssh-action@v1.2.0
        env:
          NODE_VERSION: "22"
          VM_PATH: ${{ secrets.VM_PATH }}
          VM_PUBLIC_PATH: ${{ secrets.VM_PUBLIC_PATH }}
          VM_POST_DEPLOY: ${{ secrets.VM_POST_DEPLOY }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_PORT || '22' }}
          script_stop: true
          envs: NODE_VERSION,VM_PATH,VM_PUBLIC_PATH,VM_POST_DEPLOY,GITHUB_REF_NAME
          script: |
            set -euo pipefail

            if [ -s "$HOME/.nvm/nvm.sh" ]; then
              . "$HOME/.nvm/nvm.sh"
            fi
            if command -v nvm >/dev/null 2>&1; then
              nvm install "$NODE_VERSION" >/dev/null
              nvm use "$NODE_VERSION" >/dev/null
            fi

            cd "$VM_PATH"
            git fetch --all --prune
            git checkout "$GITHUB_REF_NAME"
            git pull --ff-only origin "$GITHUB_REF_NAME"

            npm ci
            npm run build

            if [ -n "${VM_PUBLIC_PATH:-}" ]; then
              rsync -a --delete dist/ "$VM_PUBLIC_PATH"/
            fi

            if [ -n "${VM_POST_DEPLOY:-}" ]; then
              bash -lc "$VM_POST_DEPLOY"
            fi
